<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#667eea" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mirai Tree" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <title>Mirai Tree</title>
    <style>
      @font-face {
        font-family: 'Noto Sans JP';
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url('/fonts/noto-sans-jp-400.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Noto Sans JP';
        font-style: normal;
        font-weight: 700;
        font-display: block;
        src: url('/fonts/noto-sans-jp-700.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Noto Sans JP';
        font-style: normal;
        font-weight: 900;
        font-display: block;
        src: url('/fonts/noto-sans-jp-900.woff2') format('woff2');
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Noto Sans JP', -apple-system, 'Apple Color Emoji', sans-serif;
        background: #f3f4f6;
        -webkit-tap-highlight-color: transparent;
        /* iOS Safe Area */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      input, button, select { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
