    /* ═══════════════════════════════════════
       計算エンジン
    ═══════════════════════════════════════ */
    function calcMVP({ income, expense, investment }) {
      const annualExpense    = expense * 12;
      const annualInvestment = investment * 12;
      const annualCashFlow   = income - annualExpense;

      let cashSavings  = 0;
      let investAssets = 0;
      let hasNegative  = false;

      for (let y = 0; y < 35; y++) {
        cashSavings  += annualCashFlow - annualInvestment;
        investAssets  = (investAssets + annualInvestment) * 1.05;
        if (cashSavings + investAssets < 0) hasNegative = true;
      }

      const pensionAnnual = 180;
      const retireExpense = annualExpense * 0.85;
      const shortfall     = Math.max(0, retireExpense - pensionAnnual);

      for (let y = 0; y < 25; y++) {
        investAssets = investAssets * 1.03;
        if (cashSavings >= shortfall) {
          cashSavings -= shortfall;
        } else {
          investAssets -= (shortfall - cashSavings);
          cashSavings   = 0;
        }
        if (cashSavings + investAssets < 0) hasNegative = true;
      }

      const totalAssets = Math.round(cashSavings + investAssets);
      let level;
      if      (totalAssets >= 1000 && !hasNegative) level = 1;
      else if (totalAssets >= 300  && !hasNegative) level = 2;
      else if (totalAssets >= 0)                    level = 3;
      else                                          level = 4;

      return { totalAssets, hasNegative, level };
    }

    /* 年次推移データ生成（CSV出力用） */
    function calcYearlyData({ income, expense, investment }) {
      const annualExpense    = expense * 12;
      const annualInvestment = investment * 12;
      const annualCashFlow   = income - annualExpense;
      const pensionAnnual    = 180;
      const retireExpense    = annualExpense * 0.85;
      const shortfall        = Math.max(0, retireExpense - pensionAnnual);

      const rows = [];
      let cashSavings = 0, investAssets = 0;

      for (let y = 1; y <= 35; y++) {
        cashSavings  += annualCashFlow - annualInvestment;
        investAssets  = (investAssets + annualInvestment) * 1.05;
        rows.push({
          年: y, フェーズ: '積立期間',
          現金貯蓄_万円: Math.round(cashSavings),
          投資資産_万円: Math.round(investAssets),
          合計資産_万円: Math.round(cashSavings + investAssets),
        });
      }
      for (let y = 1; y <= 25; y++) {
        investAssets = investAssets * 1.03;
        if (cashSavings >= shortfall) {
          cashSavings -= shortfall;
        } else {
          investAssets -= (shortfall - cashSavings);
          cashSavings = 0;
        }
        rows.push({
          年: 35 + y, フェーズ: '老後期間',
          現金貯蓄_万円: Math.round(cashSavings),
          投資資産_万円: Math.round(investAssets),
          合計資産_万円: Math.round(cashSavings + investAssets),
        });
      }
      return rows;
    }

    /* CSV ダウンロードヘルパー */
    function downloadCSV(inputs) {
      const rows = calcYearlyData(inputs);
      const header = ['年', 'フェーズ', '現金貯蓄(万円)', '投資資産(万円)', '合計資産(万円)'];
      const body = rows.map(r =>
        [r.年, r.フェーズ, r.現金貯蓄_万円, r.投資資産_万円, r.合計資産_万円].join(',')
      );
      const meta = [
        `# ライフプランシミュレーター 試算結果`,
        `# 月収(万円):${inputs.income / 12 | 0}  月支出(万円):${inputs.expense}  月投資(万円):${inputs.investment}`,
        `# 年収(万円):${inputs.income}`,
        '',
      ].join('\n');
      const csv = '\uFEFF' + meta + header.join(',') + '\n' + body.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'lifeplan_result.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ═══════════════════════════════════════

          </div>
          <div style={{ position:'relative', height:36, display:'flex', alignItems:'center' }}>
            <div style={{
              position:'absolute', left:0, right:0, height:5,
              borderRadius:3, background:'rgba(255,255,255,0.16)', overflow:'hidden',
            }}>
              <div style={{
                width:`${pct}%`, height:'100%',
                background:`linear-gradient(90deg, ${accent}70, ${accent})`,
                borderRadius:3, transition:'width 0.15s ease',
              }}/>
            </div>
            <input
              type="range" min={min} max={max} step={step} value={value}
              onChange={e => onChange(Number(e.target.value))}
              style={{ position:'absolute', left:0, right:0, width:'100%', height:36, opacity:0, zIndex:2, margin:0, padding:0 }}
            />
            <div style={{
              position:'absolute', left:`calc(${pct}% - 11px)`,
              width:22, height:22, borderRadius:'50%',
              background:'#fff',
              boxShadow:`0 2px 10px rgba(0,0,0,0.35), 0 0 0 3px ${accent}`,
              transition:'left 0.1s ease', pointerEvents:'none',
            }}/>
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', marginTop:2 }}>
            <span style={{ fontSize:9, color:'rgba(255,255,255,0.32)', fontWeight:600 }}>{format(min)}{unit}</span>
            <span style={{ fontSize:9, color:'rgba(255,255,255,0.32)', fontWeight:600 }}>{format(max)}{unit}</span>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════
       入力画面
    ═══════════════════════════════════════ */
    const InputScreen = ({ onBack, onResult, initialInputs }) => {
      const [income,     setIncome]     = useState(initialInputs.income     || 450);
      const [expense,    setExpense]    = useState(initialInputs.expense    || 20);
      const [investment, setInvestment] = useState(initialInputs.investment || 3);
      const [shake,      setShake]      = useState(false);

      const preview = useMemo(() => calcMVP({ income, expense, investment }), [income, expense, investment]);

      const handleChange = setter => val => {
        setter(val);
        setShake(true);
        setTimeout(() => setShake(false), 380);
      };

      const LEVEL_MSG = {
        1: { text:'この調子！とても安心です 🌳', color:'#68ffaa' },
        2: { text:'いい感じです 🌿',             color:'#88ffb8' },
        3: { text:'もう少し調整してみましょう 🌱', color:'#e8e870' },
        4: { text:'見直しが必要かも 🍂',          color:'#ffb870' },
      };
      const msg = LEVEL_MSG[preview.level];

      return (
        <div style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
          <style>{`
            @keyframes treeShake { 0%,100%{transform:rotate(0deg);}25%{transform:rotate(-2.5deg);}75%{transform:rotate(2.5deg);} }
          `}</style>

          {/* ヘッダー */}
          <div style={{ display:'flex', alignItems:'center', gap:12, padding:'16px 20px 10px' }}>
            <button
              onClick={onBack}
              style={{
                width:40, height:40, borderRadius:'50%',
                border:'1.5px solid rgba(255,255,255,0.28)',
                background:'rgba(255,255,255,0.10)',
                backdropFilter:'blur(12px)',
                WebkitBackdropFilter:'blur(12px)',
                cursor:'pointer', fontSize:16, color:'#fff',
                display:'flex', alignItems:'center', justifyContent:'center',
              }}
            >←</button>
            <div style={{ fontSize:13, fontWeight:800, color:'rgba(255,255,255,0.88)', letterSpacing:0.5 }}>
              未来を育てる
            </div>
          </div>

          {/* ミニ木 + 成長ゲージ */}
          <div style={{ display:'flex', alignItems:'center', gap:16, padding:'4px 22px 8px' }}>
            <div style={{
              width:76, flexShrink:0,
              animation: shake ? 'treeShake 0.38s ease' : 'none',
              filter:'drop-shadow(0 6px 16px rgba(0,0,0,0.45))',
            }}>
              <LifeTree level={preview.level} />
            </div>
            <div style={{ flex:1 }}>
              <div style={{
                height:7, borderRadius:4,
                background:'rgba(255,255,255,0.15)',
                overflow:'hidden', marginBottom:8,
              }}>
                <div style={{
                  height:'100%',
                  width:`${[100,70,40,12][preview.level-1]}%`,
                  background:'linear-gradient(90deg, #48e878, #90ffb8)',
                  borderRadius:4,
                  transition:'width 0.45s cubic-bezier(0.34,1.2,0.64,1)',
                }}/>
              </div>
              <div style={{
                fontSize:12, fontWeight:700,
                color:msg.color,
                textShadow:'0 1px 8px rgba(0,0,0,0.45)',
              }}>
                {msg.text}
              </div>
            </div>
          </div>

          {/* ガラス スライダーパネル */}
          <div style={{
            flex:1,
            margin:'6px 16px 0',
            background:'rgba(255,255,255,0.09)',
            backdropFilter:'blur(26px)',
            WebkitBackdropFilter:'blur(26px)',
            borderRadius:26,
            border:'1px solid rgba(255,255,255,0.16)',
            padding:'20px 18px',
            display:'flex', flexDirection:'column', gap:20,
          }}>
            <SliderCard icon="💴" label="年収"       unit="万円/年" value={income}     min={200} max={1200} step={50}  onChange={handleChange(setIncome)}     format={v=>`${v}`}                              accent="#60e890"/>
            <SliderCard icon="🛒" label="月の支出"   unit="万円/月" value={expense}    min={8}   max={60}   step={1}   onChange={handleChange(setExpense)}    format={v=>`${v}`}                              accent="#60c8f8"/>
            <SliderCard icon="📈" label="月の投資額" unit="万円/月" value={investment} min={0}   max={15}   step={0.5} onChange={handleChange(setInvestment)} format={v=>v%1===0?`${v}`:v.toFixed(1)}        accent="#f8b860"/>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.38)', textAlign:'center' }}>
              スライダーを動かすと木が育ちます 🌿
            </div>
          </div>

          {/* CTA */}
          <div style={{ padding:'14px 16px 50px' }}>
            <button
              onClick={() => onResult({ income, expense, investment })}
              style={{
                width:'100%', padding:'20px',
                borderRadius:28, border:'none',
                background:'linear-gradient(135deg, #50d878 0%, #1e9050 100%)',
                color:'#fff', fontSize:18, fontWeight:900,
                cursor:'pointer', letterSpacing:'0.04em',
                boxShadow:'0 10px 40px rgba(0,80,30,0.60)',
              }}
            >
              🌳 未来を見てみる
            </button>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════
       結果画面
    ═══════════════════════════════════════ */
    const fmt = n => n >= 0 ? `+${n.toLocaleString()}万円` : `${n.toLocaleString()}万円`;

    const MVPResultScreen = ({ inputs, onBack }) => {
      const result  = useMemo(() => calcMVP(inputs), [inputs]);
      const info    = LEVEL_INFO[result.level];
      const [revealed, setRevealed] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setRevealed(true), 350);
        return () => clearTimeout(t);
      }, []);

      return (
        <div style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
          <style>{`
            @keyframes resultTreeGrow { 0%{opacity:0;transform:scale(0.65) translateY(20px);} 100%{opacity:1;transform:scale(1) translateY(0);} }
            @keyframes resultPanelUp  { from{opacity:0;transform:translateY(36px);} to{opacity:1;transform:translateY(0);} }
            @keyframes scoreReveal    { from{opacity:0;transform:scale(0.80);} to{opacity:1;transform:scale(1);} }
          `}</style>

          {/* ヘッダー */}
          <div style={{ display:'flex', alignItems:'center', gap:12, padding:'18px 20px 0' }}>
            <button
              onClick={onBack}
              style={{
                width:40, height:40, borderRadius:'50%',
                border:'1.5px solid rgba(255,255,255,0.28)',
                background:'rgba(255,255,255,0.10)',
                backdropFilter:'blur(12px)',
                WebkitBackdropFilter:'blur(12px)',
                cursor:'pointer', fontSize:15, color:'#fff',
                display:'flex', alignItems:'center', justifyContent:'center',
              }}
            >←</button>
            <div style={{ fontSize:13, fontWeight:800, color:'rgba(255,255,255,0.85)' }}>
              あなたの未来の木
            </div>
          </div>

          {/* LifeTree SVG ── 画面の主役 */}
          <div style={{
            flex:1,
            display:'flex', alignItems:'center', justifyContent:'center',
            padding:'12px 28px 0',
            animation: revealed ? 'resultTreeGrow 0.80s cubic-bezier(0.34,1.2,0.64,1) both' : 'none',
            opacity: revealed ? undefined : 0,
          }}>
            <div style={{
              width:'72%', maxWidth:270,
              filter:'drop-shadow(0 14px 34px rgba(0,0,0,0.42))',
            }}>
              <LifeTree level={result.level} />
            </div>
          </div>

          {/* ガラス 結果カード */}
          <div style={{
            background:'rgba(8,20,12,0.58)',
            backdropFilter:'blur(28px)',
            WebkitBackdropFilter:'blur(28px)',
            borderTop:'1px solid rgba(255,255,255,0.18)',
            borderRadius:'28px 28px 0 0',
            padding:'22px 20px 52px',
            animation: revealed ? 'resultPanelUp 0.65s cubic-bezier(0.22,1,0.36,1) 0.38s both' : 'none',
            opacity: revealed ? undefined : 0,
          }}>
            {/* 評価 */}
            <div style={{ textAlign:'center', marginBottom:14 }}>
              <div style={{ fontSize:42, lineHeight:1, marginBottom:8 }}>{info.emoji}</div>
              <div style={{
                fontSize:20, fontWeight:900, color:'#fff',
                textShadow:'0 2px 14px rgba(0,0,0,0.42)',
              }}>
                {info.label}
              </div>
            </div>

            {/* 老後余裕額 */}
            <div style={{
              background:'rgba(255,255,255,0.11)',
              border:'1px solid rgba(255,255,255,0.18)',
              borderRadius:18, padding:'15px',
              textAlign:'center', marginBottom:14,
            }}>
              <div style={{
                fontSize:10, color:'rgba(255,255,255,0.58)',
                fontWeight:700, letterSpacing:1.5, marginBottom:6,
              }}>
                老後余裕額（推定）
              </div>
              <div style={{
                fontSize:30, fontWeight:900, color:'#fff',
                textShadow:'0 2px 12px rgba(0,0,0,0.35)',
                animation: revealed ? 'scoreReveal 0.5s ease 0.85s both' : 'none',
                opacity: revealed ? undefined : 0,
              }}>
                {fmt(result.totalAssets)}
              </div>
              <div style={{ fontSize:9, color:'rgba(255,255,255,0.40)', marginTop:4 }}>
                ※ 65歳〜90歳までの概算
              </div>
            </div>

            {/* サブメッセージ */}
            <div style={{
              fontSize:12, color:'rgba(255,255,255,0.70)',
              textAlign:'center', lineHeight:1.80, marginBottom:20,
            }}>
              {result.level===1 && 'このままのペースで続ければ、安心した老後を迎えられます。'}
              {result.level===2 && '着実に積み上げています。少し投資を増やすとさらに安心です。'}
              {result.level===3 && '支出を少し見直すか、投資を増やすと大きく改善します。'}
              {result.level===4 && '収支バランスを見直す必要があります。まず支出から確認しましょう。'}
            </div>

            {/* CTA */}
            <button
              onClick={onBack}
              style={{
                width:'100%', padding:'18px',
                borderRadius:26, border:'none',
                background:'linear-gradient(135deg, #50d878 0%, #1e9050 100%)',
                color:'#fff', fontSize:17, fontWeight:900,
                cursor:'pointer', letterSpacing:'0.04em',
                boxShadow:'0 8px 32px rgba(0,80,30,0.50)',
                marginBottom:12,
              }}
            >
              🌱 もう少し育てる
            </button>

            {/* CSV出力 */}
            <button
              onClick={() => downloadCSV(inputs)}
              style={{
                width:'100%', padding:'13px',
                borderRadius:22,
                border:'1px solid rgba(255,255,255,0.22)',
                background:'rgba(255,255,255,0.08)',
                backdropFilter:'blur(12px)',
                WebkitBackdropFilter:'blur(12px)',
                color:'rgba(255,255,255,0.78)',
                fontSize:13, fontWeight:700,
                cursor:'pointer', letterSpacing:'0.03em',
                display:'flex', alignItems:'center', justifyContent:'center', gap:6,
              }}
            >
              <span style={{ fontSize:15 }}>📥</span> 試算データをCSVで保存
            </button>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════
       App ── 全画面ツリー背景 + 3画面ルーティング
    ═══════════════════════════════════════ */
    const STORAGE_KEY = 'lifetree_mvp_v2';
    const loadInputs  = () => { try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):null; } catch{return null;} };
    const saveInputs  = d  => { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); } catch{} };
    const DEFAULT_INPUTS = { income:450, expense:20, investment:3 };

    /* 背景フィルター（レベル別・画面別） */
    const BG_FILTER = {
      home:   'saturate(1.18) brightness(0.88) contrast(1.04)',
      input:  'saturate(1.08) brightness(0.82)',
      result: [
        'saturate(1.18) brightness(0.90)',  // lv1: 生き生き
        'saturate(1.05) brightness(0.86)',  // lv2: 健全
        'saturate(0.72) brightness(0.80)',  // lv3: やや秋
        'saturate(0.38) brightness(0.70) sepia(0.22)', // lv4: 枯れ気味
      ],
    };

    /* 暗幕オーバーレイ（各画面の雰囲気調整） */
    const TINT = {
      home:   'rgba(255,255,255,0)',
      input:  'rgba(0,12,6,0.52)',
      result: [
        'rgba(0,22,10,0.14)',   // lv1
        'rgba(0,18,8,0.24)',    // lv2
        'rgba(30,30,0,0.34)',   // lv3
        'rgba(50,22,0,0.50)',   // lv4
      ],
    };

    const App = () => {
      const [screen,   setScreen]   = useState('home');
      // lifeType は HomeScreen 内部で管理するようになったため App 側では不要
      const [inputs,   setInputs]   = useState(() => loadInputs() || DEFAULT_INPUTS);

      useEffect(() => { if (screen==='input') saveInputs(inputs); }, [inputs, screen]);

      const handleStart       = d  => { setInputs(d); setScreen('input'); };
      const handleResult      = ni => { setInputs(ni); saveInputs(ni); setScreen('result'); };
      const handleBackToInput = ()  => setScreen('input');
      const handleBackToHome  = ()  => setScreen('home');

      /* 現在のレベル（inputとresultで使用） */
      const activeLevel = useMemo(() => {
        if (screen==='home') return 1;
        return calcMVP(inputs).level;
      }, [screen, inputs]);

      const bgFilter = screen==='result'
        ? (BG_FILTER.result[activeLevel-1] || BG_FILTER.result[0])
        : BG_FILTER[screen];

      const tintBg = screen==='result'
        ? (TINT.result[activeLevel-1] || TINT.result[0])
        : TINT[screen];

      return (
        <div style={{ width:'100vw', height:'100vh', position:'relative', overflow:'hidden' }}>

          {/* ── 全画面ツリー背景 ── */}
          <div style={{
            position:'absolute', top:0, left:0, width:'100%', height:'100%',
            backgroundImage:"url('/hero-tree2.jpg')",
            backgroundSize:'cover',
            backgroundPosition:'center center',
            backgroundRepeat:'no-repeat',
            zIndex:0,
            transition:'filter 0.95s ease',
            filter:bgFilter,
          }}/>

          {/* ── 雰囲気オーバーレイ ── */}
          <div style={{
            position:'absolute', inset:0,
            zIndex:1,
            pointerEvents:'none',
            transition:'background 0.95s ease',
            background:tintBg,
          }}/>

          {/* ── 画面コンテンツ ── */}
          <div style={{ position:'relative', zIndex:2, width:'100%', height:'100%', overflowY:'auto' }}>
            {screen==='home'   && <HomeScreen onStart={handleStart}/>}
            {screen==='input'  && <InputScreen onBack={handleBackToHome} onResult={handleResult} initialInputs={inputs}/>}
            {screen==='result' && <MVPResultScreen inputs={inputs} onBack={handleBackToInput}/>}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
